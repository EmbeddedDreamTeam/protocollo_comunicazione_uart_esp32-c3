; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf
; upload_port = /dev/ttyACM0

#!!!! ATTENTO;   
board_build.sdkconfig_defaults = sdkconfig.defaults

# Ensure the configured flash size matches your board (common values: 2MB, 4MB)
# The firmware currently exceeds the default 1MB image size; set to 4MB for esp32-c3 devkit
board_build.flash_size = 4MB
board_build.partitions = partitions.csv

# attenzione agli headers
build_flags =
    -I include/uart_headers
    -I include/wifi_headers
    -I include/cinematics_header
    -Os
    -DSKIP_WIFI_INIT

#always add to platformio.ini
monitor_speed = 115200 ;serve che la speed della scheda e quella del serial monitor siano uguali
; build_flags = ;senza serial monitor non va, boh
;   -DARDUINO_USB_CDC_ON_BOOT=1
;   -DARDUINO_USB_MODE=1
